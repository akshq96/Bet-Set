name: SportStrike CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sportstrike
          POSTGRES_PASSWORD: sportstrike
          POSTGRES_DB: sportstrike
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Lint API
        run: npm run lint --workspace=@sportstrike/api

      - name: Build API
        run: npm run build --workspace=@sportstrike/api
        env:
          DATABASE_URL: postgresql://sportstrike:sportstrike@localhost:5432/sportstrike

      - name: Build Web
        run: npm run build --workspace=@sportstrike/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
